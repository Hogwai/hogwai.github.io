name: Link check

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check links
        id: link-check
        run: |
          set +e
          OUTPUT=$(find src/content -name '*.md' -o -name '*.mdx' | xargs npx markdown-link-check --config .markdown-link-check.json 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "output<<$EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create or update issue
        if: steps.link-check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Broken links detected';
            const label = 'broken-links';
            const body = `## Broken links detected

            The weekly link check found broken links:

            \`\`\`
            ${process.env.LINK_OUTPUT}
            \`\`\`

            _This issue was automatically created by the scheduled link check workflow._`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open'
            });

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
              console.log(`Updated existing issue #${issues.data[0].number}`);
            } else {
              // Ensure label exists
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'e11d48',
                  description: 'Automatically detected broken links'
                });
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label]
              });
              console.log('Created new issue');
            }
        env:
          LINK_OUTPUT: ${{ steps.link-check.outputs.output }}
